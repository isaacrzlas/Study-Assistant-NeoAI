<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Continue with Google | Neo AI</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="popup-body">
    <section class="popup-card">
      <div class="google-mark">G</div>
      <p class="eyebrow">Continue with Google</p>
      <h1>Select your account</h1>
      <p class="popup-copy">This local demo creates a Neo AI account linked to your Google email. Add an optional profile photo URL to use it as your account picture.</p>
      <label>
        <span>Google email</span>
        <input id="email" type="email" placeholder="you@gmail.com" autocomplete="email" />
      </label>
      <label>
        <span>Username</span>
        <input id="username" placeholder="Isaac" autocomplete="nickname" />
      </label>
      <label>
        <span>Profile photo URL</span>
        <input id="picture" placeholder="https://..." autocomplete="off" />
      </label>
      <button class="primary-action" id="continueButton" type="button">Continue</button>
      <small>For production, replace this fallback with a real Google OAuth Client ID.</small>
    </section>
    <div class="toast" id="toast">Ready</div>
    <script>
      const toast = document.querySelector("#toast");
      const showToast = text => {
        toast.textContent = text;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2400);
      };
      document.querySelector("#continueButton").addEventListener("click", () => {
        const email = document.querySelector("#email").value.trim();
        const username = document.querySelector("#username").value.trim();
        const picture = document.querySelector("#picture").value.trim();
        if (!email || !email.includes("@")) return showToast("Enter a Google email.");
        if (!username) return showToast("Enter a username.");
        const user = {
          name: username,
          username,
          email,
          picture,
          provider: "google-demo"
        };
        const db = JSON.parse(localStorage.getItem("neoAccounts") || "{}");
        db[email] = { username, email, picture, createdAt: db[email]?.createdAt || new Date().toISOString(), updatedAt: new Date().toISOString() };
        localStorage.setItem("neoAccounts", JSON.stringify(db));
        localStorage.setItem("neoCurrentUser", JSON.stringify(user));
        if (window.opener) {
          window.opener.postMessage({ type: "neo-google-demo-login", user }, location.origin);
        }
        window.close();
      });
    </script>
  </body>
</html>
